name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker images
        run: docker compose build

  deploy:
    name: Deploy VPS
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Test VPS reachability
        run: |
          echo "Testing whether GitHub runner can reach the VPS on port ${{ secrets.VPS_SSH_PORT || 22 }}..."
          timeout 20 bash -c 'cat < /dev/null > /dev/tcp/${{ secrets.VPS_HOST }}/${{ secrets.VPS_SSH_PORT || 22 }}' 2>/dev/null && echo "Port reachable" || echo "Port unreachable from GitHub"
        continue-on-error: true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          timeout: 120s
          command_timeout: 30m
          script: |
            set -e
            cd "${{ secrets.VPS_REPO_PATH }}"
            if [ ! -f .env ]; then
              echo "Missing .env on VPS. Create it from .env.example before deploying."
              exit 1
            fi
            git fetch origin main
            git reset --hard origin/main
            docker compose up -d --build
            docker image prune -f
