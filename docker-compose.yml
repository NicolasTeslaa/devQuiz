services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8000}:80"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__MySql: server=db;port=3306;database=${MYSQL_DATABASE:-devquiz};user=${MYSQL_USER:-devquiz};password=${MYSQL_PASSWORD:-devquiz_password}
      Jwt__Key: ${JWT_KEY:-change-this-jwt-key-before-production-32chars}
      Jwt__Issuer: ${JWT_ISSUER:-DevQuiz}
      Jwt__Audience: ${JWT_AUDIENCE:-DevQuiz.Frontend}
      Cors__AllowedOrigins__0: http://localhost:8000
    ports:
      - "${BACKEND_PORT:-8001}:8080"
    restart: unless-stopped

  db:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-devquiz_root_password}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-devquiz}
      MYSQL_USER: ${MYSQL_USER:-devquiz}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-devquiz_password}
    volumes:
      - devquiz_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  devquiz_mysql_data:
